# Configuramos solo el bloque HTTP para no chocar con las directivas globales de la imagen
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Habilitar gzip para mejorar rendimiento si lo deseas
    gzip on;

    server {
        listen 80 default_server;
        root /var/www/html/public;
        index index.php index.html index.htm;

        charset utf-8;

        # Evitar logs innecesarios
        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        location / {
            # Interceptamos las peticiones OPTIONS (CORS Preflight) directamente aquí
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://ovni-xi.vercel.app' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }

            try_files $uri $uri/ /index.php?$query_string;
        }

        # Configuración para procesar los archivos PHP con PHP-FPM
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        # Bloquear acceso a archivos ocultos (.env, .git, etc.)
        location ~ /\.ht {
            deny all;
        }
    }
}