server {
    listen 80 default_server;
    root /var/www/html/public;
    index index.php index.html index.htm;

    charset utf-8;

    # Desactivar logs para archivos comunes
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Configuración principal y CORS Preflight (OPTIONS)
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://ovni-xi.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesamiento de PHP mediante el Socket de Unix
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        fastcgi_pass unix:/var/run/php-fpm.sock;
        
        fastcgi_next_upstream error timeout invalid_header http_500;
        fastcgi_connect_timeout 10s;
        fastcgi_read_timeout 10s;
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # ❌ SE ELIMINARON LOS HEADERS DUPLICADOS DE AQUÍ
        # Dejamos que Laravel maneje el CORS de sus propias respuestas HTTP nativas.
    }

    # Bloquear acceso a archivos ocultos del sistema
    location ~ /\.ht {
        deny all;
    }
}